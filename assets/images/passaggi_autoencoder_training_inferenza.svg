  <title
     id="title1">Passaggi di un autoencoder, raggruppati per addestramento e inferenza</title>
  <desc
     id="desc1">Un riquadro tratteggiato di addestramento contiene il percorso immagine, encoder, spazio latente, decoder e ricostruzione. Un secondo riquadro tratteggiato di inferenza contiene un punto casuale che viene passato al decoder condiviso per produrre un immagine generata, tipicamente meno plausibile.</desc>
