  <title
     id="title1">Analogia semantica uomo:re come donna:regina su un piano cartesiano</title>
  <desc
     id="desc1">Un piano cartesiano con quattro vettori uscenti dall origine verso i punti uomo, donna, re e regina, piu due vettori che collegano uomo a re e donna a regina, paralleli tra loro e con la stessa lunghezza.</desc>
