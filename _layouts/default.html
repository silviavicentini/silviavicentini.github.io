<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}"/>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>
    {% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}
  </title>
  <meta name="description" content="{{ page.description | default: site.description }}"/>
  {% seo %}
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <!-- MathJax -->
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <ul class="nav-links">
      {% for item in site.navigation %}
      <li>
        <a href="{{ item.url | relative_url }}"
           {% if page.url == item.url %}class="active"{% endif %}>
          {{ item.name }}
        </a>
      </li>
      {% endfor %}
    </ul>
  </nav>

  {{ content }}

  <!-- FOOTER -->
  <footer>
    <span class="footer-logo">{{ site.title }}</span>
    <span class="footer-note">{{ site.author.name }}
      
      <a href="https://www.linkedin.com/in/silvia-vicentini-707743210/" target="_blank" aria-label="LinkedIn">
      <i class="fab fa-linkedin"></i>
    </a></span>
  </footer>
</body>
</html>
