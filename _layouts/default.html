<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}"/>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>
    {% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}
  </title>
  <meta name="description" content="{{ page.description | default: site.description }}"/>
  {% seo %}
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }} Feed" href="{{ '/feed.xml' | relative_url }}" />
  
  <!-- MathJax -->
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']]
      },
      svg: {
        fontCache: 'global'
      }
    };
  </script>
  <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <ul class="nav-links">
      {% for item in site.navigation %}
      <li>
        <a href="{{ item.url | relative_url }}"
           {% if page.url == item.url %}class="active"{% endif %}>
          {{ item.name }}
        </a>
      </li>
      {% endfor %}
    </ul>
  </nav>

  {{ content }}

  <!-- FOOTER -->
  <footer>
    <span class="footer-logo">{{ site.title }}</span>
    <span class="footer-note">{{ site.author.name }}
      <span class="footer-contact">
        <a id="email-link" href="#" aria-label="Send email to Silvia" title="Send email to Silvia">
          <i class="fas fa-envelope"></i>
        </a>
        <a href="https://www.linkedin.com/in/silvia-vicentini-707743210/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn" title="LinkedIn">
          <i class="fab fa-linkedin"></i>
        </a>
      </span>
    </span>
  </footer>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var emailLink = document.getElementById('email-link');
      if (!emailLink) return;
      var user = 'silvia.vicentini.work';
      var domain = 'gmail.com';
      var mailto = 'mailto:' + user + '@' + domain;
      emailLink.href = mailto;
      emailLink.target = '_blank';
      emailLink.rel = 'noopener noreferrer';
      emailLink.addEventListener('click', function(event) {
        event.preventDefault();
        window.open(mailto, '_blank');
      });
    });
  </script>
  <script data-goatcounter="https://attention-span.goatcounter.com/count"
          async src="https://gc.zgo.at/count.js"></script>
</body>
</html>
